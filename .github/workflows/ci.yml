name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Restore Supabase Docker cache
        id: supabase-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/supabase-docker
          key: supabase-docker-v2-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        if: steps.supabase-cache.outputs.cache-hit == 'true'
        run: for f in /tmp/supabase-docker/*.tar; do docker load -i "$f"; done

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies & start Supabase in parallel
        run: |
          pnpm install --frozen-lockfile &
          supabase start --exclude realtime,edge-runtime,logflare,vector,studio,imgproxy,supavisor &
          wait

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Save Docker images to cache
        if: steps.supabase-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/supabase-docker
          docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgrest|gotrue|realtime|storage|pgmeta|kong|logflare|pg_' | while read img; do
            name=$(echo "$img" | tr '/:' '_')
            docker save "$img" -o "/tmp/supabase-docker/${name}.tar"
          done

      - name: Upload Supabase Docker cache
        if: always() && steps.supabase-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/supabase-docker
          key: supabase-docker-v2-${{ hashFiles('supabase/config.toml') }}

      - run: pnpm exec tsx tests/e2e/seed.ts
      - run: pnpm exec playwright test
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
